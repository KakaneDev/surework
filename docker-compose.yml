version: '3.8'

# SureWork ERP Platform - Docker Compose Configuration
# For local development and testing

services:
  # ==================== Infrastructure ====================

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: surework-postgres
    environment:
      POSTGRES_USER: surework
      POSTGRES_PASSWORD: surework
      POSTGRES_DB: surework
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surework"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - surework-network

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: surework-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - surework-network

  # Apache Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: surework-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - surework-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: surework-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - surework-network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: surework-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: surework
      MINIO_ROOT_PASSWORD: surework123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - surework-network

  # ==================== Service Discovery ====================

  # Eureka Service Registry
  eureka-server:
    build:
      context: ./services/eureka-server
      dockerfile: Dockerfile
    container_name: surework-eureka
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:TieredStopAtLevel=1 -Djava.security.egd=file:/dev/./urandom -Dspring.jndi.ignore=true"
      SPRING_MAIN_LAZY-INITIALIZATION: "true"
      SPRING_MAIN_BANNER-MODE: "off"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - surework-network

  # ==================== API Gateway ====================

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: surework-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:TieredStopAtLevel=1 -Djava.security.egd=file:/dev/./urandom -Dspring.jndi.ignore=true"
      SPRING_MAIN_LAZY-INITIALIZATION: "true"
      SPRING_MAIN_BANNER-MODE: "off"
      EUREKA_URI: http://eureka-server:8761/eureka
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-surework-jwt-secret-key-change-in-production}
    depends_on:
      - eureka-server
      - redis
    networks:
      - surework-network

  # ==================== Microservices ====================

  # Admin Service
  admin-service:
