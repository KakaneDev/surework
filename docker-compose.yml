      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:TieredStopAtLevel=1 -Djava.security.egd=file:/dev/./urandom -Dspring.jndi.ignore=true"
      SPRING_MAIN_LAZY-INITIALIZATION: "true"
      SPRING_MAIN_BANNER-MODE: "off"
      SPRING_JPA_OPEN-IN-VIEW: "false"
      SPRING_DATASOURCE_HIKARI_MINIMUM-IDLE: "1"
      SPRING_DATASOURCE_HIKARI_MAXIMUM-POOL-SIZE: "5"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/surework_tenant
      SPRING_DATASOURCE_USERNAME: surework
      SPRING_DATASOURCE_PASSWORD: surework
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-surework-jwt-secret-key-change-in-production-must-be-at-least-256-bits}
      SUREWORK_SECURITY_JWT_SECRET: ${JWT_SECRET:-surework-jwt-secret-key-change-in-production-must-be-at-least-256-bits}
      SUREWORK_SERVICES_IDENTITY-SERVICE_URL: http://identity-service:8085
    depends_on:
      - postgres
      - eureka-server
      - kafka
    networks:
      - surework-network

  # Identity Service (Auth)
  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    container_name: surework-identity
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:TieredStopAtLevel=1 -Djava.security.egd=file:/dev/./urandom -Dspring.jndi.ignore=true"
      SPRING_MAIN_LAZY-INITIALIZATION: "true"
      SPRING_MAIN_BANNER-MODE: "off"
      SPRING_JPA_OPEN-IN-VIEW: "false"
      SPRING_DATASOURCE_HIKARI_MINIMUM-IDLE: "1"
      SPRING_DATASOURCE_HIKARI_MAXIMUM-POOL-SIZE: "5"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/surework_identity
      SPRING_DATASOURCE_USERNAME: surework
      SPRING_DATASOURCE_PASSWORD: surework
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-surework-jwt-secret-key-change-in-production-must-be-at-least-256-bits}
      SUREWORK_SECURITY_JWT_SECRET: ${JWT_SECRET:-surework-jwt-secret-key-change-in-production-must-be-at-least-256-bits}
    depends_on:
      - postgres
      - eureka-server
      - kafka
      - redis
    networks:
      - surework-network

  # Admin Dashboard Frontend
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: surework-frontend-admin
    ports:
      - "4201:80"
    environment:
      API_URL: http://api-gateway:8080
    depends_on:
      - api-gateway
    networks:
      - surework-network

  # MailHog (Email testing)
  mailhog:
    image: mailhog/mailhog
    container_name: surework-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - surework-network

# ==================== Networks ====================
networks:
  surework-network:
    driver: bridge

# ==================== Volumes ====================
volumes:
  postgres_data:
  redis_data:
  minio_data:
