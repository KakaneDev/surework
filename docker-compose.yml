      SPRING_MAIN_LAZY-INITIALIZATION: "true"
      SPRING_MAIN_BANNER-MODE: "off"
      SPRING_JPA_OPEN-IN-VIEW: "false"
      SPRING_DATASOURCE_HIKARI_MINIMUM-IDLE: "1"
      SPRING_DATASOURCE_HIKARI_MAXIMUM-POOL-SIZE: "5"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/surework_admin
      SPRING_DATASOURCE_USERNAME: surework
      SPRING_DATASOURCE_PASSWORD: surework
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: surework_admin
      DB_USERNAME: surework
      DB_PASSWORD: surework
      EUREKA_URI: http://eureka-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-surework-jwt-secret-key-change-in-production-must-be-at-least-256-bits}
      SUREWORK_SERVICES_IDENTITY-SERVICE_URL: http://identity-service:8085
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: false
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: false
      APP_FRONTEND_URL: http://localhost:4200
