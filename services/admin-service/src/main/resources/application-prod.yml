# Production Profile Configuration
# Use: SPRING_PROFILES_ACTIVE=prod or --spring.profiles.active=prod
# All secrets MUST be provided via environment variables

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    clean-disabled: true

# Production database - requires environment variables
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

# Production Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

# Production mail - requires environment variables
# Supports SMTP providers: SendGrid, Mailgun, Amazon SES, or corporate SMTP
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Production JWT and session - MUST be set via environment variables
surework:
  admin:
    jwt:
      secret: ${JWT_SECRET}
      expiration-hours: 8
    session:
      idle-timeout-minutes: 30

logging:
  level:
    com.surework.admin: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    root: INFO
