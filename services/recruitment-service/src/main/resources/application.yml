spring:
  application:
    name: recruitment-service
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:surework_recruitment}
    username: ${DB_USERNAME:surework}
    password: ${DB_PASSWORD:surework}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      # Use 'validate' in production, 'update' only for development
      ddl-auto: ${DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Africa/Johannesburg
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: recruitment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.surework.*

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8086}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true

# Application-specific configuration
surework:
  recruitment:
    # Maximum applications per job posting
    max-applications-per-job: 500
    # Days to keep closed job postings
    closed-job-retention-days: 90
    # Allowed resume file types
    allowed-resume-types: pdf,doc,docx
    # Maximum resume file size in MB
    max-resume-size-mb: 5

# Portal automation configuration (Playwright-based)
portal:
  automation:
    # Run browser in headless mode (set to false for debugging)
    headless: ${PORTAL_HEADLESS:true}
    # Delay between actions in ms (helps avoid bot detection)
    slow-mo: ${PORTAL_SLOW_MO:100}
    # Directory to save screenshots on error
    screenshots-dir: ${PORTAL_SCREENSHOTS_DIR:./screenshots}
    # Directory for browser data (cookies, sessions)
    user-data-dir: ${PORTAL_USER_DATA_DIR:./browser-data}
    # Maximum retries for failed postings
    max-retries: 3
    # Batch size for processing pending postings
    batch-size: 5

  storage:
    type: ${STORAGE_TYPE:local}
    local:
      base-path: ${STORAGE_LOCAL_PATH:/tmp/surework/recruitment}
    s3:
      bucket: ${S3_BUCKET:surework-recruitment}
      region: ${S3_REGION:af-south-1}

logging:
  level:
    com.surework: DEBUG
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG
