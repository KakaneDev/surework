# Production Profile Configuration
# Use: SPRING_PROFILES_ACTIVE=prod or --spring.profiles.active=prod
# All secrets MUST be provided via environment variables

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    clean-disabled: true

# Production database - requires environment variables
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # Higher pool size for recruitment - handles high candidate volume
      maximum-pool-size: 30
      minimum-idle: 10

# Production Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

# Production storage - S3
surework:
  admin:
    jwt:
      secret: ${JWT_SECRET}
  storage:
    type: s3
    s3:
      bucket: ${S3_BUCKET}
      region: ${S3_REGION}
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}

logging:
  level:
    com.surework: INFO
    org.hibernate.SQL: WARN
    org.springframework.transaction: WARN
    root: INFO
