# Production Profile Configuration
# Use: SPRING_PROFILES_ACTIVE=prod or --spring.profiles.active=prod
# All secrets MUST be provided via environment variables

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    clean-disabled: true

# Production database - requires environment variables
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # Standard pool size for document service
      maximum-pool-size: 20
      minimum-idle: 5

# Production Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

# Production storage - S3
surework:
  admin:
    jwt:
      secret: ${JWT_SECRET}
  document:
    storage:
      type: s3
      s3:
        endpoint: ${S3_ENDPOINT}
        region: ${S3_REGION}
        bucket: ${S3_BUCKET}
        access-key: ${S3_ACCESS_KEY}
        secret-key: ${S3_SECRET_KEY}

logging:
  level:
    com.surework: INFO
    software.amazon.awssdk: WARN
    org.hibernate.SQL: WARN
    root: INFO
