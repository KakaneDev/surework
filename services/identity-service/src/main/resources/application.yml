server:
  port: 8085

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://localhost:5432/surework_admin
    username: ${DB_USERNAME:surework}
    password: ${DB_PASSWORD:surework}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# JWT Configuration
surework:
  security:
    jwt:
      secret: ${JWT_SECRET:surework-jwt-secret-key-for-development-only-change-in-production}
      expiration-hours: 8
      refresh-expiration-days: 7

# Logging Configuration
logging:
  level:
    com.surework.identity: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
