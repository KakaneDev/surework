# Production Profile Configuration
# Use: SPRING_PROFILES_ACTIVE=prod or --spring.profiles.active=prod
# All secrets MUST be provided via environment variables

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# Production database - requires environment variables
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

# Production JWT - MUST be set via environment variables
surework:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-hours: 8
      refresh-expiration-days: 7

logging:
  level:
    com.surework.identity: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    root: INFO
