# Development Profile Configuration
# Use: SPRING_PROFILES_ACTIVE=dev or --spring.profiles.active=dev

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

# Development database defaults
  datasource:
    url: jdbc:postgresql://localhost:5432/surework_admin
    username: surework
    password: surework
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

# Development JWT settings
surework:
  security:
    jwt:
      secret: surework-dev-jwt-secret-key-for-development-only
      expiration-hours: 24
      refresh-expiration-days: 30

logging:
  level:
    com.surework.identity: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
