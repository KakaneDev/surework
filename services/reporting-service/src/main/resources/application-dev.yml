# Development Profile Configuration
# Use: SPRING_PROFILES_ACTIVE=dev or --spring.profiles.active=dev

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    clean-disabled: false
  cache:
    type: caffeine
  thymeleaf:
    cache: false

# Development database defaults
  datasource:
    url: jdbc:postgresql://localhost:5432/surework_reporting
    username: surework
    password: surework
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000
      connection-test-query: SELECT 1

# Development Kafka
  kafka:
    bootstrap-servers: localhost:9092

# Development service URLs
surework:
  admin:
    jwt:
      secret: surework-dev-jwt-secret-key-for-development-only
  services:
    employee-service:
      url: http://localhost:8082
    payroll-service:
      url: http://localhost:8082
    leave-service:
      url: http://localhost:8083
    time-attendance-service:
      url: http://localhost:8084
    recruitment-service:
      url: http://localhost:8085

logging:
  level:
    com.surework.reporting: DEBUG
    org.springframework.cache: DEBUG
    org.hibernate.SQL: DEBUG
