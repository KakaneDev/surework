<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${report.name}">Leave Report</title>
    <style>
        @page { size: A4; margin: 1.5cm; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9pt; line-height: 1.4; color: #333; margin: 0; padding: 15px; }
        .header { border-bottom: 2px solid #7c3aed; padding-bottom: 15px; margin-bottom: 20px; }
        .company-name { font-size: 20pt; font-weight: bold; color: #6d28d9; }
        .report-title { font-size: 16pt; margin-top: 8px; color: #1f2937; }
        .report-meta { font-size: 8pt; color: #6b7280; margin-top: 8px; }
        .summary-box { background-color: #f5f3ff; border: 1px solid #c4b5fd; border-radius: 6px; padding: 12px; margin-bottom: 15px; display: flex; gap: 25px; flex-wrap: wrap; }
        .summary-item { }
        .summary-label { font-size: 7pt; color: #6b7280; text-transform: uppercase; }
        .summary-value { font-size: 14pt; font-weight: bold; color: #6d28d9; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #6d28d9; color: white; border: 1px solid #5b21b6; padding: 6px 8px; text-align: left; font-weight: 600; font-size: 8pt; }
        td { border: 1px solid #d1d5db; padding: 5px 8px; font-size: 8pt; }
        tr:nth-child(even) { background-color: #f9fafb; }
        .number { text-align: right; }
        .currency { text-align: right; font-family: 'Courier New', monospace; }
        .footer { margin-top: 20px; text-align: center; font-size: 7pt; color: #9ca3af; border-top: 1px solid #e5e7eb; padding-top: 10px; }
        .low-balance { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="company-name" th:text="${companyName}">SureWork ERP</div>
        <div class="report-title" th:text="${report.name}">Leave Report</div>
        <div class="report-meta">
            Generated: <strong th:text="${#temporals.format(generatedAt, 'dd MMM yyyy HH:mm')}">01 Jan 2024</strong>
        </div>
    </div>

    <table th:if="${!#lists.isEmpty(data)}">
        <thead>
            <tr>
                <th>Emp #</th>
                <th>Employee Name</th>
                <th>Department</th>
                <th>Leave Type</th>
                <th class="number">Entitlement</th>
                <th class="number">Carried Over</th>
                <th class="number">Used</th>
                <th class="number">Pending</th>
                <th class="number">Available</th>
                <th th:if="${report.reportType.name() == 'LEAVE_LIABILITY'}" class="currency">Daily Rate</th>
                <th th:if="${report.reportType.name() == 'LEAVE_LIABILITY'}" class="currency">Liability</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${data}">
                <td th:text="${row.get('employeeNumber')}">EMP001</td>
                <td th:text="${row.get('employeeName')}">Name</td>
                <td th:text="${row.get('department')}">Dept</td>
                <td th:text="${row.get('leaveType')}">ANNUAL</td>
                <td class="number" th:text="${row.get('entitlement')}">15</td>
                <td class="number" th:text="${row.get('carriedOver')}">0</td>
                <td class="number" th:text="${row.get('used')}">0</td>
                <td class="number" th:text="${row.get('pending')}">0</td>
                <td class="number" th:classappend="${row.get('available') != null and row.get('available') < 3} ? 'low-balance' : ''" th:text="${row.get('available')}">15</td>
                <td th:if="${report.reportType.name() == 'LEAVE_LIABILITY'}" class="currency" th:text="${row.get('dailyRate') != '' ? 'R ' + #numbers.formatDecimal(row.get('dailyRate'), 1, 'COMMA', 2, 'POINT') : ''}">R 0.00</td>
                <td th:if="${report.reportType.name() == 'LEAVE_LIABILITY'}" class="currency" style="font-weight: bold;" th:text="${row.get('leaveLiability') != '' ? 'R ' + #numbers.formatDecimal(row.get('leaveLiability'), 1, 'COMMA', 2, 'POINT') : ''}">R 0.00</td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        <p>Generated by SureWork ERP | Leave Report | BCEA Compliant</p>
    </div>
</body>
</html>
