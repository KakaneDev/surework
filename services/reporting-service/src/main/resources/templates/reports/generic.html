<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${report.name}">Report</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 10pt;
            line-height: 1.5;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .header {
            border-bottom: 2px solid #2563eb;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .company-name {
            font-size: 24pt;
            font-weight: bold;
            color: #1e40af;
        }

        .report-title {
            font-size: 18pt;
            margin-top: 10px;
            color: #1f2937;
        }

        .report-meta {
            font-size: 9pt;
            color: #6b7280;
            margin-top: 10px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 12pt;
            font-weight: bold;
            color: #1e40af;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #f3f4f6;
            border: 1px solid #d1d5db;
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 9pt;
        }

        td {
            border: 1px solid #d1d5db;
            padding: 8px 10px;
            font-size: 9pt;
        }

        tr:nth-child(even) {
            background-color: #f9fafb;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 8pt;
            color: #9ca3af;
            padding: 10px;
            border-top: 1px solid #e5e7eb;
        }

        .summary-box {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .summary-item {
            display: inline-block;
            margin-right: 30px;
        }

        .summary-label {
            font-size: 8pt;
            color: #6b7280;
            text-transform: uppercase;
        }

        .summary-value {
            font-size: 16pt;
            font-weight: bold;
            color: #1e40af;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            font-style: italic;
        }

        .currency {
            text-align: right;
        }

        .number {
            text-align: right;
        }

        .date {
            white-space: nowrap;
        }

        .status-active {
            color: #059669;
            font-weight: 600;
        }

        .status-inactive {
            color: #dc2626;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="company-name" th:text="${companyName}">SureWork ERP</div>
        <div class="report-title" th:text="${report.name}">Report Title</div>
        <div class="report-meta">
            <span>Report Type: <strong th:text="${report.reportType}">TYPE</strong></span> |
            <span>Generated: <strong th:text="${#temporals.format(generatedAt, 'dd MMM yyyy HH:mm')}">01 Jan 2024 12:00</strong></span>
            <span th:if="${report.dateFrom != null}">
                | Period: <strong th:text="${#temporals.format(report.dateFrom, 'dd MMM yyyy')} + ' to ' + ${#temporals.format(report.dateTo, 'dd MMM yyyy')}">01 Jan - 31 Jan 2024</strong>
            </span>
        </div>
    </div>

    <!-- Summary Section -->
    <div class="section" th:if="${!#lists.isEmpty(data)}">
        <div class="summary-box">
            <div class="summary-item">
                <div class="summary-label">Total Records</div>
                <div class="summary-value" th:text="${#lists.size(data)}">0</div>
            </div>
        </div>
    </div>

    <!-- Data Table -->
    <div class="section">
        <div class="section-title">Report Data</div>

        <div th:if="${#lists.isEmpty(data)}" class="no-data">
            No data available for the selected criteria.
        </div>

        <table th:if="${!#lists.isEmpty(data)}">
            <thead>
                <tr>
                    <th th:each="header : ${data[0].keySet()}"
                        th:text="${#strings.capitalize(#strings.replace(header, '_', ' '))}">
                        Column
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${data}">
                    <td th:each="header : ${row.keySet()}"
                        th:text="${row.get(header)}"
                        th:classappend="${#strings.containsIgnoreCase(header, 'amount') or #strings.containsIgnoreCase(header, 'salary') or #strings.containsIgnoreCase(header, 'cost')} ? 'currency' : ''">
                        Value
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Generated by SureWork ERP | Confidential | Page <span class="page"></span></p>
        <p>© 2024 SureWork. All rights reserved.</p>
    </div>
</body>
</html>
