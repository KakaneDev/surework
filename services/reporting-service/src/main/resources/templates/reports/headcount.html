<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${report.name}">Headcount Report</title>
    <style>
        @page { size: A4 landscape; margin: 1.5cm; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9pt; line-height: 1.4; color: #333; margin: 0; padding: 15px; }
        .header { border-bottom: 2px solid #2563eb; padding-bottom: 15px; margin-bottom: 20px; }
        .company-name { font-size: 20pt; font-weight: bold; color: #1e40af; }
        .report-title { font-size: 16pt; margin-top: 8px; color: #1f2937; }
        .report-meta { font-size: 8pt; color: #6b7280; margin-top: 8px; }
        .summary-box { background-color: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: 12px; margin-bottom: 15px; display: flex; gap: 30px; }
        .summary-item { }
        .summary-label { font-size: 7pt; color: #6b7280; text-transform: uppercase; }
        .summary-value { font-size: 14pt; font-weight: bold; color: #1e40af; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #1e40af; color: white; border: 1px solid #1e3a8a; padding: 6px 8px; text-align: left; font-weight: 600; font-size: 8pt; }
        td { border: 1px solid #d1d5db; padding: 5px 8px; font-size: 8pt; }
        tr:nth-child(even) { background-color: #f9fafb; }
        .number { text-align: right; }
        .currency { text-align: right; }
        .footer { margin-top: 20px; text-align: center; font-size: 7pt; color: #9ca3af; border-top: 1px solid #e5e7eb; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="company-name" th:text="${companyName}">SureWork ERP</div>
        <div class="report-title">Headcount Summary Report</div>
        <div class="report-meta">
            Generated: <strong th:text="${#temporals.format(generatedAt, 'dd MMM yyyy HH:mm')}">01 Jan 2024 12:00</strong>
        </div>
    </div>

    <div class="summary-box" th:if="${!#lists.isEmpty(data)}">
        <div class="summary-item">
            <div class="summary-label">Total Departments</div>
            <div class="summary-value" th:text="${#lists.size(data)}">0</div>
        </div>
    </div>

    <table th:if="${!#lists.isEmpty(data)}">
        <thead>
            <tr>
                <th>Department</th>
                <th class="number">Total</th>
                <th class="number">Active</th>
                <th class="number">On Leave</th>
                <th class="number">Full-Time</th>
                <th class="number">Contract</th>
                <th class="number">Male</th>
                <th class="number">Female</th>
                <th class="number">Avg Age</th>
                <th class="number">Avg Tenure (Yrs)</th>
                <th class="currency">Total Salary</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${data}">
                <td th:text="${row.get('department')}">Department</td>
                <td class="number" th:text="${row.get('totalEmployees')}">0</td>
                <td class="number" th:text="${row.get('active')}">0</td>
                <td class="number" th:text="${row.get('onLeave')}">0</td>
                <td class="number" th:text="${row.get('fullTime')}">0</td>
                <td class="number" th:text="${row.get('contract')}">0</td>
                <td class="number" th:text="${row.get('male')}">0</td>
                <td class="number" th:text="${row.get('female')}">0</td>
                <td class="number" th:text="${row.get('avgAge')}">0</td>
                <td class="number" th:text="${row.get('avgTenureYears')}">0</td>
                <td class="currency" th:text="'R ' + ${#numbers.formatDecimal(row.get('totalSalaryCost'), 1, 'COMMA', 2, 'POINT')}">R 0.00</td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        <p>Generated by SureWork ERP | Confidential | Headcount Summary Report</p>
    </div>
</body>
</html>
