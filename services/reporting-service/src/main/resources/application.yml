server:
  port: 8087

spring:
  application:
    name: reporting-service

  datasource:
    url: jdbc:postgresql://localhost:5432/surework_reporting
    username: ${DB_USERNAME:surework}
    password: ${DB_PASSWORD:surework}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: reporting-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.surework.*

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: true

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# SureWork Reporting Configuration
surework:
  reporting:
    # Report generation settings
    generation:
      async-threshold-rows: 10000  # Generate async if more than this
      max-concurrent-reports: 5
      timeout-minutes: 30
      temp-directory: ${java.io.tmpdir}/surework-reports

    # Export formats
    export:
      pdf:
        enabled: true
        page-size: A4
        company-logo-path: classpath:static/logo.png
      excel:
        enabled: true
        max-rows: 1048576  # Excel limit
        include-formulas: true
      csv:
        enabled: true
        delimiter: ","
        include-header: true

    # Caching configuration
    cache:
      dashboard-ttl-minutes: 5
      report-ttl-minutes: 30
      analytics-ttl-minutes: 15

    # Scheduled reports
    scheduled:
      enabled: true
      cron-daily: "0 6 * * *"  # 6 AM daily
      cron-weekly: "0 6 * * 1"  # 6 AM Monday
      cron-monthly: "0 6 1 * *"  # 6 AM 1st of month

    # South African statutory reports
    statutory:
      # EMP201 Monthly submission
      emp201:
        enabled: true
        reminder-days-before: 5  # Remind 5 days before due date (7th of month)

      # EMP501 Bi-annual reconciliation
      emp501:
        enabled: true
        interim-due-month: 10  # October
        annual-due-month: 5   # May

      # UI-19 UIF submission
      ui19:
        enabled: true

      # Employment Equity Reports (EEA2, EEA4)
      employment-equity:
        enabled: true
        reporting-month: 10  # October 1st deadline

    # Report categories
    categories:
      hr:
        - headcount-report
        - turnover-report
        - demographics-report
        - skills-matrix
        - training-report
        - probation-report

      payroll:
        - payroll-summary
        - payroll-register
        - statutory-deductions
        - cost-to-company
        - variance-report
        - year-to-date

      leave:
        - leave-balance
        - leave-utilization
        - sick-leave-patterns
        - absence-trends

      time-attendance:
        - attendance-summary
        - overtime-report
        - late-arrivals
        - early-departures
        - timesheet-compliance

      statutory:
        - emp201
        - emp501
        - ui19
        - eea2
        - eea4
        - irp5
        - it3a

      financial:
        - labor-cost-analysis
        - department-budget
        - headcount-forecast

# Logging Configuration
logging:
  level:
    com.surework.reporting: DEBUG
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
