# Production Profile Configuration
# Use: SPRING_PROFILES_ACTIVE=prod or --spring.profiles.active=prod
# All secrets MUST be provided via environment variables

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    clean-disabled: true
  cache:
    type: redis
  thymeleaf:
    cache: true

# Production database - requires environment variables
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

# Production Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

# Production Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

# Production service URLs via service discovery
surework:
  admin:
    jwt:
      secret: ${JWT_SECRET}
  services:
    employee-service:
      url: ${EMPLOYEE_SERVICE_URL}
    payroll-service:
      url: ${PAYROLL_SERVICE_URL}
    leave-service:
      url: ${LEAVE_SERVICE_URL}
    time-attendance-service:
      url: ${TIME_ATTENDANCE_SERVICE_URL}
    recruitment-service:
      url: ${RECRUITMENT_SERVICE_URL}

logging:
  level:
    com.surework.reporting: INFO
    org.springframework.cache: WARN
    org.hibernate.SQL: WARN
    root: INFO
