server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: hr-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:surework_hr}
    username: ${DB_USERNAME:surework}
    password: ${DB_PASSWORD:surework}
  jpa:
    hibernate:
      # Use 'validate' in production, 'update' only for development
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

surework:
  admin:
    jwt:
      secret: ${JWT_SECRET:}

logging:
  level:
    com.surework: DEBUG
