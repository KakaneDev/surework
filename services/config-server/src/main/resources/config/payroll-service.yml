# Payroll Service specific configuration
server:
  port: 8084

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/surework}
    username: ${DATABASE_USERNAME:surework}
    password: ${DATABASE_PASSWORD:surework}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    consumer:
      group-id: payroll-service

# Payroll Service configuration
surework:
  payroll:
    tax:
      # South Africa tax year runs March to February
      year-start-month: 3
      # UIF contribution rates
      uif-employee-rate: 0.01
      uif-employer-rate: 0.01
      uif-ceiling: 17712.00
    payslip:
      # PDF generation settings
      template: default
      retention-years: 7
