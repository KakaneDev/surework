# Accounting Service specific configuration
server:
  port: 8085

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/surework}
    username: ${DATABASE_USERNAME:surework}
    password: ${DATABASE_PASSWORD:surework}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    consumer:
      group-id: accounting-service

# Accounting Service configuration
surework:
  accounting:
    vat:
      rate: 0.15
      registration-threshold: 1000000.00
    fiscal-year:
      # Most SA companies use Feb year-end
      end-month: 2
    chart-of-accounts:
      # Standard SA chart of accounts structure
      asset-prefix: "1"
      liability-prefix: "2"
      equity-prefix: "3"
      revenue-prefix: "4"
      expense-prefix: "5"
