# Common configuration shared by all services
# Services can override these values in their own {service-name}.yml

spring:
  # Database defaults
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  # JPA defaults
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        jdbc:
          time_zone: UTC
        format_sql: false

  # Jackson defaults
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Kafka defaults
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      batch-size: 16384
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false

# Security defaults
surework:
  security:
    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-for-development-only-change-in-production}
      access-token-expiry: 15m
      refresh-token-expiry: 7d
    bcrypt:
      strength: 12
    mfa:
      challenge-expiry: 5m
    rate-limit:
      max-failed-attempts: 5
      lockout-duration: 15m

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Logging defaults
logging:
  level:
    root: INFO
    com.surework: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{tenantId}] [%X{userId}] %-5level %logger{36} - %msg%n"
