server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:4200"
              - "http://localhost:4201"
              - "http://127.0.0.1:4200"
              - "http://127.0.0.1:4201"
              - "https://app.surework.co.za"
              - "https://admin.surework.co.za"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - "Authorization"
              - "X-Request-Id"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            redis-rate-limiter.requestedTokens: 1

      routes:
        # Portal Management (routes to recruitment-service, not admin-service)
        - id: admin-portal-management
          uri: http://localhost:8086
          predicates:
            - Path=/admin-api/v1/admin/portals/**
          filters:
            - RewritePath=/admin-api/v1/admin/portals/(?<segment>.*), /api/admin/portals/$\{segment}

        # Tenant Service - Public Signup (no auth)
        - id: tenant-signup
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/signup/**
          filters:
            - StripPrefix=0

        # Tenant Service - Authenticated endpoints
        - id: tenant-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/tenants/**
          filters:
            - StripPrefix=0

        # Admin Service
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=0

        # Employee Service - direct URL since Eureka is disabled
        - id: employee-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/employees/**,/api/v1/departments/**
          filters:
            - StripPrefix=0

        # Leave Service
        - id: leave-service
          uri: lb://leave-service
          predicates:
            - Path=/api/leave/**
          filters:
            - StripPrefix=0

        # Payroll Service
        - id: payroll-service
          uri: lb://payroll-service
          predicates:
            - Path=/api/payroll/**
          filters:
            - StripPrefix=0

        # Accounting Service
        - id: accounting-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/accounting/**
          filters:
            - StripPrefix=0

        # Recruitment Service - direct URL since Eureka is disabled
        - id: recruitment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/recruitment/**
          filters:
            - StripPrefix=0

        # Time & Attendance Service
        - id: time-attendance-service
          uri: lb://time-attendance-service
          predicates:
            - Path=/api/time/**
          filters:
            - StripPrefix=0

        # Document Service - direct URL since Eureka is disabled
        - id: document-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/documents/**
          filters:
            - StripPrefix=0

        # Reporting Service - direct URL since Eureka is disabled
        - id: reporting-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/reporting/**
          filters:
            - StripPrefix=0

        # Support Service - direct URL since Eureka is disabled
        - id: support-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/support/**
          filters:
            - StripPrefix=0

        # Notification Service - REST API (runs on port 8090)
        - id: notification-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0

        # Notification Service - WebSocket (runs on port 8090)
        - id: notification-websocket
          uri: ws://localhost:8090
          predicates:
            - Path=/ws/notifications/**
          filters:
            - StripPrefix=0

        # ==================== Admin Dashboard Routes ====================

        # Analytics Service
        - id: analytics-service
          uri: http://localhost:8092
          predicates:
            - Path=/admin-api/v1/analytics/**
          filters:
            - RewritePath=/admin-api/v1/analytics/(?<segment>.*), /api/v1/analytics/$\{segment}

        # Billing Service
        - id: billing-service
          uri: http://localhost:8093
          predicates:
            - Path=/admin-api/v1/billing/**,/admin-api/v1/discounts/**,/admin-api/v1/payments/**,/admin-api/v1/invoices/**
          filters:
            - RewritePath=/admin-api/v1/(?<segment>.*), /api/v1/$\{segment}

        # Admin Service - Tenant Management (for admin dashboard)
        - id: admin-tenants
          uri: lb://admin-service
          predicates:
            - Path=/admin-api/v1/tenants/**
          filters:
            - RewritePath=/admin-api/v1/tenants/(?<segment>.*), /api/admin/tenants/$\{segment}

        # Admin Service - Onboarding
        - id: admin-onboarding
          uri: lb://admin-service
          predicates:
            - Path=/admin-api/v1/onboarding/**
          filters:
            - RewritePath=/admin-api/v1/onboarding/(?<segment>.*), /api/admin/onboarding/$\{segment}

        # Admin Service - Trials
        - id: admin-trials
          uri: lb://admin-service
          predicates:
            - Path=/admin-api/v1/trials/**
          filters:
            - RewritePath=/admin-api/v1/trials/(?<segment>.*), /api/admin/trials/$\{segment}

        # Admin Service - Support Tickets (for admin dashboard)
        - id: admin-tickets
          uri: lb://admin-service
          predicates:
            - Path=/admin-api/v1/tickets/**,/admin-api/v1/canned-responses/**
          filters:
            - RewritePath=/admin-api/v1/(?<segment>.*), /api/admin/$\{segment}

        # Admin Dashboard Auth
        - id: admin-auth
          uri: lb://admin-service
          predicates:
            - Path=/admin-api/v1/auth/**
          filters:
            - RewritePath=/admin-api/v1/auth/(?<segment>.*), /api/admin/auth/$\{segment}

        # Admin Dashboard WebSocket
        - id: admin-websocket
          uri: ws://localhost:8088
          predicates:
            - Path=/ws/admin/**
          filters:
            - StripPrefix=0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 5
    instances:
      admin-service:
        base-config: default
      employee-service:
        base-config: default
      payroll-service:
        base-config: default

  timelimiter:
    configs:
      default:
        timeout-duration: 30s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: when_authorized
    gateway:
      enabled: true

# JWT Configuration
surework:
  gateway:
    jwt:
      secret: ${JWT_SECRET:}
      header: Authorization
      prefix: Bearer

    # Public paths (no authentication required)
    public-paths:
      - /api/admin/auth/login
      - /api/admin/auth/refresh
      - /admin-api/v1/auth/login
      - /admin-api/v1/auth/refresh
      - /api/v1/signup
      - /api/v1/signup/**
      - /api/v1/employees/**
      - /api/v1/departments/**
      - /api/v1/accounting/**
      - /admin-api/v1/admin/portals/**
      - /actuator/health
      - /swagger-ui/**
      - /v3/api-docs/**

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.surework.gateway: DEBUG
