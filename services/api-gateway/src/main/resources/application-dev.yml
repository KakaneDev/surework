# Development Profile Configuration
# Use: SPRING_PROFILES_ACTIVE=dev or --spring.profiles.active=dev

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:4200"
              - "http://127.0.0.1:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

# Development Redis (optional - can run without)
  data:
    redis:
      host: localhost
      port: 6379

# Development JWT secret (NOT for production use)
surework:
  gateway:
    jwt:
      secret: surework-dev-jwt-secret-key-for-development-only

# Disable rate limiting in development
  cloud.gateway.default-filters: []

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.surework.gateway: DEBUG
    org.springframework.security: DEBUG
