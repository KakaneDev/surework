# Development Profile Configuration
# Use: SPRING_PROFILES_ACTIVE=dev or --spring.profiles.active=dev

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    clean-disabled: false

# Development database defaults
  datasource:
    url: jdbc:postgresql://localhost:5432/surework_support
    username: surework
    password: surework
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

# Development Kafka
  kafka:
    bootstrap-servers: localhost:9092

# Development JWT secret (NOT for production use)
surework:
  admin:
    jwt:
      secret: surework-dev-jwt-secret-key-for-development-only

logging:
  level:
    com.surework: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
