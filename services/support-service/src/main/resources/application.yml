server:
  port: ${SERVER_PORT:8089}

spring:
  application:
    name: support-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:surework_support}
    username: ${DB_USERNAME:surework}
    password: ${DB_PASSWORD:surework}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

surework:
  admin:
    jwt:
      secret: ${JWT_SECRET:}
  support:
    ticket-reference-prefix: TKT
    auto-routing:
      HR_REQUESTS: hr-team
      PAYROLL_BENEFITS: payroll-team
      LEAVE_ATTENDANCE: leave-admin
      IT_SUPPORT: it-team
      FACILITIES: facilities-team
      FINANCE: finance-team
      OTHER: general-admin

logging:
  level:
    com.surework: DEBUG
