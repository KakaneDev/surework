###############################################################################
# SureWork ERP - Production Docker Compose
# Deploys all microservices, PostgreSQL, Kafka, and supporting infrastructure
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
###############################################################################

services:

  # ===========================================================================
  # INFRASTRUCTURE SERVICES
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: surework-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: surework
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - surework-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: surework-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - surework-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: surework-kafka
    restart: always
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - surework-net

  redis:
    image: redis:7-alpine
    container_name: surework-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - surework-net

  minio:
    image: minio/minio:latest
    container_name: surework-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - surework-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: surework-mailhog
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - surework-net

  # ===========================================================================
  # SPRING CLOUD INFRASTRUCTURE
  # ===========================================================================

  eureka-server:
    build:
      context: ../../services/eureka-server
      dockerfile: ../../infrastructure/gcp-deploy/Dockerfile.service
    image: surework/eureka-server
    container_name: surework-eureka
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8761
      EUREKA_USERNAME: admin
      EUREKA_PASSWORD: surework
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - surework-net

  # ===========================================================================
  # API GATEWAY
  # ===========================================================================

  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: ../../infrastructure/gcp-deploy/Dockerfile.service
    image: surework/api-gateway
    container_name: surework-api-gateway
    restart: always
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://admin:surework@eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      CORS_ALLOWED_ORIGINS: "http://136.116.141.75,http://localhost"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - surework-net

  # ===========================================================================
  # CORE BUSINESS SERVICES
