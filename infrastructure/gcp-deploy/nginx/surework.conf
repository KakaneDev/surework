# =============================================================================
# SureWork ERP - Nginx Reverse Proxy Configuration
# Routes traffic to API Gateway and serves frontend static files
# =============================================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Upstream: API Gateway
upstream api_gateway {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Upstream: Eureka Dashboard (internal)
upstream eureka_dashboard {
    server 127.0.0.1:8761;
}

# --- Main server block (HTTP) ---
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # --- Frontend (Angular) ---
    location / {
        root /opt/surework/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- Admin Frontend ---
    location /admin {
        alias /opt/surework/frontend-admin/dist;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # --- API Gateway ---
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://api_gateway/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # --- Eureka Dashboard (restrict to localhost or VPN in production) ---
    location /eureka/ {
        proxy_pass http://eureka_dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # TODO: Restrict access by IP in production
        # allow 10.0.0.0/8;
        # deny all;
    }

    # --- Health check endpoint ---
    location /health {
        proxy_pass http://api_gateway/actuator/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # --- Deny access to hidden files ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Client body size (for file uploads)
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/surework_access.log;
    error_log /var/log/nginx/surework_error.log;
}
